services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: monocrypt
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
  
  bot:
    build: .
    restart: unless-stopped
    environment:
      - BOT_API=${BOT_API}
      - DATABASE_URL=postgresql://user:password123@db:5432/monocrypt
    depends_on:
      - db
